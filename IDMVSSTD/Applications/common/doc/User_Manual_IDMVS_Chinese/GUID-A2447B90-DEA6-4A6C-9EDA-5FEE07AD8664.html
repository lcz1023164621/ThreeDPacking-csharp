    <h1 class="title topictitle1">设置</h1>

    
<div class="body conbody"><p class="shortdesc">通过菜单栏的<span class="ph uicontrol">设置</span>可对IDMVS及读码器进行全局相关设置。</p>

        <ul class="ul" id="GUID-A2447B90-DEA6-4A6C-9EDA-5FEE07AD8664__UL_WFD_LXH_T2C">
            <li class="li" id="GUID-A2447B90-DEA6-4A6C-9EDA-5FEE07AD8664__GUID-1F9A3BC7-67D0-4833-804B-BDE2F7E5B378">
                <p class="p"><a class="xref" href="GUID-21C0803F-EF87-4EAA-BC52-FAC22DE80023.html#GUID-21C0803F-EF87-4EAA-BC52-FAC22DE80023" title="通用可对读码器刷新和本机PC播放声音进行相关设置。">通用</a>：可设置读码器刷新及PC声音播放相关功能。</p>

            </li>

            <li class="li" id="GUID-A2447B90-DEA6-4A6C-9EDA-5FEE07AD8664__GUID-69CCC24B-A693-4DD7-AE2B-7B928A6872BD">
                <p class="p"><a class="xref" href="GUID-D7E2D52E-3606-4973-8A6B-0D5263A25343.html#GUID-D7E2D52E-3606-4973-8A6B-0D5263A25343" title="历史记录导出可设置读码器导出历史记录的方式、文件格式、文件个数以及存储路径等。">历史记录导出</a>：可设置读码器如何导出历史记录。</p>

            </li>

            <li class="li" id="GUID-A2447B90-DEA6-4A6C-9EDA-5FEE07AD8664__GUID-9E769CD7-C66E-46A0-9E4F-3A3AF03CC009">
                <p class="p"><a class="xref" href="GUID-3C3D7CEB-6F13-4517-9ABE-D4CEE71593D8.html#GUID-3C3D7CEB-6F13-4517-9ABE-D4CEE71593D8" title="结果显示可对图像预览区域中读取结果的显示进行设置。">结果显示</a>：可设置读码器读码后，如何在图像预览窗口显示读码结果。</p>

            </li>

            <li class="li" id="GUID-A2447B90-DEA6-4A6C-9EDA-5FEE07AD8664__GUID-2CBAE38A-A384-441C-898F-F22CDC97AE6F">
                <p class="p"><a class="xref" href="GUID-B0666C62-ABE2-4BE1-B728-703D1165E93A.html#GUID-B0666C62-ABE2-4BE1-B728-703D1165E93A" title="焦点输出支持在可编辑文本框（例如记事本、Word文档、对话框等）中自动输入读码器的读码结果。">焦点输出</a>：可设置在可编辑文本框中读码器自动输入的读码结果。</p>

            </li>

            <li class="li" id="GUID-A2447B90-DEA6-4A6C-9EDA-5FEE07AD8664__GUID-F1A077B2-1E15-44C7-92FB-47EAD28BADF2">
                <p class="p"><a class="xref" href="GUID-68D7C850-0CDC-4E88-BBEF-98E6B877014C.html#GUID-68D7C850-0CDC-4E88-BBEF-98E6B877014C" title="通过快捷键可对IDMVS的常用功能进行快捷键设置。">快捷键</a>：可设置IDMVS常用功能的快捷键。</p>

            </li>

            <li class="li" id="GUID-A2447B90-DEA6-4A6C-9EDA-5FEE07AD8664__GUID-C1770E8B-DD0E-417C-9CCD-62C89F7880EE">
                <p class="p"><a class="xref" href="GUID-ED033F61-8FA1-4DB9-8418-8263DFEEA37F.html#GUID-ED033F61-8FA1-4DB9-8418-8263DFEEA37F" title="通过权限可设置管理员和操作员，同时还可对IDMVS进行锁定。">权限</a>：可设置IDMVS是否区分角色及权限。</p>

            </li>

        </ul>

    </div>


</div>
