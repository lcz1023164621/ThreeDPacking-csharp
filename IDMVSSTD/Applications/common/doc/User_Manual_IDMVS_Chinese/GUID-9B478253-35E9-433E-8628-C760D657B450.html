    <h1 class="title topictitle1">预览时采集不到图像</h1>

    

<div class="body conbody"><p class="shortdesc">IDMVS采集不到图像，可能和环境配置、参数设置等有关。</p>

        <div class="section" id="GUID-9B478253-35E9-433E-8628-C760D657B450__GUID-F2A302A9-FC56-4C13-9EDD-4038DAF821D2"><h2 class="title sectiontitle">现象</h2>
            
            <p class="p">IDMVS开启<span class="ph uicontrol">实时取流</span>后，采集不到图像。此时图像预览区下方的<span class="keyword parmname">图像采集</span>数值为0，<span class="keyword parmname">图像数</span>的数值无变化。</p>

        </div>

        <div class="section" id="GUID-9B478253-35E9-433E-8628-C760D657B450__GUID-6E969CE7-9008-4DC8-9CCF-AF348170A161"><h2 class="title sectiontitle">解决方法</h2>
            
            <p class="p">您可按照以下方法逐步排查。</p>

            <ol class="ol" id="GUID-9B478253-35E9-433E-8628-C760D657B450__OL_GWM_KGM_1FC">
                <li class="li" id="GUID-9B478253-35E9-433E-8628-C760D657B450__GUID-8302AE85-8B06-4B85-978F-DB69418F5556">
                    <p class="p">确认已关闭防火墙及相关杀毒软件。若未关闭，可能会导致采图异常。</p>

                </li>

                <li class="li" id="GUID-9B478253-35E9-433E-8628-C760D657B450__GUID-ACBE2D55-44AF-4EE9-A36C-12CD46A5E97D">
                    <p class="p">确认已关闭读码器的<span class="ph uicontrol">触发模式</span>。</p>

                </li>

            </ol>

        </div>

    </div>


</div>
