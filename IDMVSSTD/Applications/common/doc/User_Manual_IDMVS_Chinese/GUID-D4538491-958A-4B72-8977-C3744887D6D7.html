    <h1 class="title topictitle1">读码器连接</h1>


<div class="body conbody"><p class="shortdesc">连接读码器是使用IDMVS进行读码的必要条件，也是打开客户端后的初始步骤。本章节主要介绍环境准备工作，并指导您一步步发现并连接读码器。</p>

<p class="p">连接读码器的步骤主要通过“设备列表”实现。未连接读码器时，可通过以下两种方式打开悬浮显示的“设备列表”。</p>

        <ul class="ul" id="GUID-D4538491-958A-4B72-8977-C3744887D6D7__UL_TXW_DWZ_S2C">
            <li class="li" id="GUID-D4538491-958A-4B72-8977-C3744887D6D7__GUID-CB3C1CE9-9588-4428-AF50-EBCB94141403">
                <p class="p">单击左上角<span class="keyword parmname">暂无相机，点击添加</span>右侧的<span class="ph uicontrol">＋</span>。</p>

            </li>

            <li class="li" id="GUID-D4538491-958A-4B72-8977-C3744887D6D7__GUID-952A7CD8-66D6-48BF-BCAC-84ABD0A0AF70">
                <p class="p">单击左侧页面的<span class="ph uicontrol">连接相机</span>。</p>

            </li>

        </ul>

        <div class="fig fignone" id="GUID-D4538491-958A-4B72-8977-C3744887D6D7__FIG_NHN_QWZ_S2C">
            
            <img class="image" style="display:none;" id="GUID-D4538491-958A-4B72-8977-C3744887D6D7__IMAGE_OHN_QWZ_S2C" src="GUID-447D8136-A1DB-4543-948C-9854E2E8442E-high.png" width="1100" />
        <div class="fig_caption"><span class="figcap">图 1 设备列表进入方式</span></div></div>

        <p class="p">打开设备列表后，可跟随以下步骤完成读码器连接和基础配置。</p>

        <div class="fig imagemap" id="GUID-D4538491-958A-4B72-8977-C3744887D6D7__IMAGEMAP_QNB_PM5_LFC"><img usemap="#d77519e57" id="GUID-D4538491-958A-4B72-8977-C3744887D6D7__IMAGE_W2S_4ML_XFC" border="0" class="image image_usemap" src="GUID-6C5ADBED-97B1-4DAD-919A-70E0B484C399-high.png" width="1500" />
