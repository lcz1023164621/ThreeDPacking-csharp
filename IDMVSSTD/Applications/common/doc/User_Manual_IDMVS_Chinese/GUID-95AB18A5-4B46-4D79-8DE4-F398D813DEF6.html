    <h1 class="title topictitle1">过滤排序</h1>

    
    
    <div class="body conbody"><p class="shortdesc">IDMVS支持通过普通过滤、正则表达式过滤和脚本过滤三种模式筛选读码结果，并可设置排序规则以优化数据输出。</p>

        <div class="note note" id="GUID-95AB18A5-4B46-4D79-8DE4-F398D813DEF6__GUID-36F23CCB-76C1-4BC4-BF6C-A012E05B7D4A"><span class="notetitle">说明</span> 
            
            <p class="p">当读码器导入Lua脚本后，读码器优先采用脚本过滤模式对数据进行处理，普通过滤、正则表达式过滤不生效。Lua脚本详情请参见<a class="xref" href="GUID-1FD49EC0-F215-424C-9EE7-76B06BFD2B20.html#GUID-1FD49EC0-F215-424C-9EE7-76B06BFD2B20" title="Lua脚本功能赋予IDMVS高度的灵活性和可扩展性，适用于读码逻辑定制、数据处理与分析、相机行为控制、设备交互等场景，实现自动化和智能化的图像采集与处理。">Lua脚本</a>。</p>

        </div>

    </div>
