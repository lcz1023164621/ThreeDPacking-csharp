    <h1 class="title topictitle1">调试图像及码制</h1>


<div class="body conbody"><p class="shortdesc">当读码配置需要精细调整时，可通过成像配置、码制选择模块调整图像、光源、码制类型等参数，确保条码清晰可辨识；当读码环境动态变换时，可通过参数轮询预设多组参数组合，自动切换以应对变换的场景。</p>

        <div class="note note" id="GUID-9ED8A60A-4358-4489-A0B0-005FA5B048B5__GUID-2709B8D3-F1CA-420D-B3ED-F405E051648A"><span class="notetitle">说明</span> 
            <p class="p">若通过<span class="ph uicontrol">成像配置</span>、<span class="ph uicontrol">码制选择</span>功能模块配置后仍无法清晰读码，可在快捷工具栏单击<span class="ph uicontrol">全部参数</span>，调试更完整的图像、读码算法、智能调参、聚焦、自适应、光源等参数。</p>

        </div>

    </div>


</div>
