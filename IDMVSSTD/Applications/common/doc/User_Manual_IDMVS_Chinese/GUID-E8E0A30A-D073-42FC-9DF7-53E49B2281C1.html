    <h1 class="title topictitle1">预览时画面全黑</h1>

    

<div class="body conbody"><p class="shortdesc">IDMVS预览图像，画面全黑时，可尝试调整曝光或镜头光圈进行改善。</p>

        <div class="section" id="GUID-E8E0A30A-D073-42FC-9DF7-53E49B2281C1__GUID-A1D291EA-48FC-4EE4-8646-05EDA0D689A1"><h2 class="title sectiontitle">现象</h2>
            
            <p class="p">在IDMVS开启<span class="ph uicontrol">实时取流</span>后，预览图像时画面全黑。此时图像预览区下方的<span class="keyword parmname">图像采集</span>的数值不为0，<span class="keyword parmname">图像数</span>的数值会不断叠加。</p>

        </div>

        <div class="section" id="GUID-E8E0A30A-D073-42FC-9DF7-53E49B2281C1__GUID-CAD53EF2-A032-4315-B544-79EBAA7067D7"><h2 class="title sectiontitle">解决方法</h2>
            
            <p class="p">通过<span class="ph uicontrol">成像配置</span>增大<span class="keyword parmname">曝光时间</span>参数或开启<span class="keyword parmname">连续自动曝光</span>模式。</p>

            <div class="note note" id="GUID-E8E0A30A-D073-42FC-9DF7-53E49B2281C1__GUID-5B54EC35-44A7-4640-B4D0-6EA09BB2F067"><span class="notetitle">说明</span> 
                <p class="p">需自行配备镜头的读码器可先尝试调小镜头的光圈。</p>

            </div>

        </div>

    </div>


</div>
