    <h1 class="title topictitle1">保存图像</h1>


    <div class="body conbody"><p class="shortdesc">读码器完成参数配置并预览图像达到想要的效果后，如您想保存图像，可通过菜单栏的<span class="ph uicontrol">存图</span>来实现。</p>

        <p class="p">IDMVS支持多种方式保存图像，不同存图方式的用途或本质有所差异。</p>

        <ul class="ul" id="GUID-7B2CB895-8384-44F3-A0F3-3788E6D7ADD5__UL_HP3_WKZ_Z2C">
            
            <li class="li" id="GUID-7B2CB895-8384-44F3-A0F3-3788E6D7ADD5__GUID-BF78F09D-7148-4712-AA9E-07ECA160FE0A">
                <p class="p"><a class="xref" href="GUID-9B65ABDB-62FE-4C22-8E46-750F094B35FD.html#GUID-9B65ABDB-62FE-4C22-8E46-750F094B35FD" title="客户端存图是通过IDMVS层面将读码器图像存储到本机PC上。通过菜单栏存图的客户端存图可设置存图规则。">客户端存图</a>：通过IDMVS将读码器图像存储到本机PC上。</p>

            </li>

            <li class="li" id="GUID-7B2CB895-8384-44F3-A0F3-3788E6D7ADD5__GUID-4615443E-E2EE-46D3-8467-EE70E45979D2">
                
                <p class="p"><a class="xref" href="GUID-4EFCB13F-13C4-4288-A2D0-9CD02A602E24.html#GUID-4EFCB13F-13C4-4288-A2D0-9CD02A602E24" title="相机存图是指读码器将图像存储到自身内置的存储介质中。">相机存图</a>：读码器将图像存储到自身内置的存储介质中。</p>

            </li>

            <li class="li" id="GUID-7B2CB895-8384-44F3-A0F3-3788E6D7ADD5__GUID-6185345C-F519-4457-8742-C3F8882E17AB">
                <p class="p"><a class="xref" href="GUID-D0FF465C-9D02-4E72-91DF-8FDA54B37BD9.html#GUID-D0FF465C-9D02-4E72-91DF-8FDA54B37BD9" title="FTP存储功能将本机PC作为FTP的服务端，读码器作为FTP的客户端，通过FTP服务将读码器的图像或读码结果传输到本机PC上。通过菜单栏存图的FTP存储可设置本机PC作为FTP服务端的相关参数。">FTP存储</a>：将本机PC作为FTP的服务端，读码器作为FTP的客户端，通过FTP服务将读码器的图像或读码结果传输到本机PC上。</p>

            </li>

        </ul>

    </div>


</div>
